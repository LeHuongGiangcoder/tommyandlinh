<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSAP Basic Demo</title>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; background: #111; color: white; display: flex; flex-direction: column; align-items: center; }
        .section { height: 100vh; display: flex; justify-content: center; align-items: center; width: 100%; border-bottom: 1px solid #333; }
        .box { width: 100px; height: 100px; background: #f06; border-radius: 10px; margin: 20px; display: flex; justify-content: center; align-items: center; font-weight: bold; }
        .stagger-container { display: flex; gap: 10px; }
        .stagger-box { width: 50px; height: 50px; background: #0cf; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="section" id="section-1">
        <div>
            <h2>Basic Animation</h2>
            <div class="box basic-box">Spin</div>
        </div>
    </div>

    <div class="section" id="section-2">
        <div>
            <h2>ScrollTrigger & Stagger</h2>
            <div class="stagger-container">
                <div class="stagger-box"></div>
                <div class="stagger-box"></div>
                <div class="stagger-box"></div>
                <div class="stagger-box"></div>
                <div class="stagger-box"></div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script>
        // Register Plugin
        gsap.registerPlugin(ScrollTrigger);

        // 1. Basic Animation
        gsap.to(".basic-box", {
            rotation: 360,
            x: 200,
            duration: 2,
            ease: "bounce.out",
            repeat: -1, // Infinite
            yoyo: true  // back and forth
        });

        // 2. ScrollTrigger with Stagger
        gsap.from(".stagger-box", {
            scrollTrigger: {
                trigger: "#section-2",
                start: "top 60%", // When top of trigger hits 60% down the viewport
                end: "bottom 80%",
                toggleActions: "play none none reverse", // play enter, reverse leave-back
                markers: true // Helpful for debugging
            },
            y: 50,
            opacity: 0,
            duration: 0.8,
            stagger: 0.2, // Animate one after another
            ease: "back.out(1.7)"
        });
    </script>
</body>
</html>
